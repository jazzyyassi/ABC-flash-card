<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Flashcards</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', sans-serif;
            background-color: white;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        #app {
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .big-letter {
            font-size: 50vh;
            font-weight: bold;
            color: #333;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .emoji {
            font-size: 30vh;
        }

        .word {
            font-size: 15vh;
            text-transform: uppercase;
            color: #007bff;
            margin-top: 10px;
        }

        .fade-in {
            animation: fadeIn 0.2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="app" onclick="handleTap()">
        <div id="display" class="big-letter fade-in">A</div>
    </div>

    <script>
        const cards = [
            { l: "A", w: "ANT", img: "ANT.png" },
            { l: "B", w: "BAT", img: "BAT.png" },
            { l: "C", w: "CAT", img: "CAT.png" },
            { l: "D", w: "DOG", img: "DOG.png" },
            { l: "E", w: "EGG", img: "EGG.png" },
            { l: "F", w: "FAN", img: "FAN.png" },
            { l: "G", w: "GUM", img: "GUM.png" },
            { l: "H", w: "HAT", img: "HAT.png" },
            { l: "I", w: "INK", img: "INK.png" },
            { l: "J", w: "JAM", img: "JAM.png" },
            { l: "K", w: "KIT", img: "KIT.png" },
            { l: "L", w: "LOG", img: "LOG.png" },
            { l: "M", w: "MAP", img: "MAP.png" },
            { l: "N", w: "NET", img: "NET.png" },
            { l: "O", w: "OX", img: "OX.png" },
            { l: "P", w: "PIG", img: "PIG.png" },
            { l: "Q", w: "QUEEN", img: "QUEEN.png" },
            { l: "R", w: "RAT", img: "RAT.png" },
            { l: "S", w: "SUN", img: "SUN.png" },
            { l: "T", w: "TEN", img: "TEN.png" },
            { l: "U", w: "UP", img: "UP.png" },
            { l: "V", w: "VAN", img: "VAN.png" },
            { l: "W", w: "WIG", img: "WIG.png" },
            { l: "X", w: "BOX", img: "BOX.png" },
            { l: "Y", w: "YAK", img: "YAK.png" },
            { l: "Z", w: "ZIP", img: "ZIP.png" }
        ];

        let index = 0;
        let isWordView = false;
        const display = document.getElementById('display');

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function handleTap() {
            const current = cards[index];
            if (!isWordView) {
                // Show Image + Word
                display.classList.remove('big-letter');
                display.innerHTML = `
                    <div class="card-content fade-in">
                        <div class="emoji">${current.e}</div>
                        <div class="word">${current.w}</div>
                    </div>`;
                speak(current.w);
                isWordView = true;
            } else {
                // Show Next Letter
                index = (index + 1) % cards.length;
                display.classList.add('big-letter');
                display.innerHTML = cards[index].l;
                speak(cards[index].l);
                isWordView = false;
            }
        }
    </script>
</body>
</html>
